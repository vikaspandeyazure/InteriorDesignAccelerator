<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 980" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Interior Design Accelerator – Azure architecture">
  <title>Interior Design Accelerator – Azure architecture</title>

  <!-- ===== Defs ===== -->
  <defs>
    <!-- Tile gradients per Azure-style category -->
    <linearGradient id="gUser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A7574"/><stop offset="100%" stop-color="#4B4948"/>
    </linearGradient>
    <linearGradient id="gEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B9CFF"/><stop offset="100%" stop-color="#0062C2"/>
    </linearGradient>
    <linearGradient id="gCompute" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B4AC4"/><stop offset="100%" stop-color="#4A1F8F"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A33FA3"/><stop offset="100%" stop-color="#5A1A5A"/>
    </linearGradient>
    <linearGradient id="gData" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DA42D"/><stop offset="100%" stop-color="#0B5A0B"/>
    </linearGradient>
    <linearGradient id="gObs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0651A"/><stop offset="100%" stop-color="#A02800"/>
    </linearGradient>
    <linearGradient id="gId" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F8FE0"/><stop offset="100%" stop-color="#004B85"/>
    </linearGradient>

    <!-- Soft drop shadow for tiles -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>

    <!-- Reusable Azure-style tile (220 x 88) -->
    <symbol id="tile" overflow="visible">
      <rect x="0" y="0" width="220" height="88" rx="10" ry="10" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1" filter="url(#shadow)"/>
      <rect x="0" y="0" width="220" height="22" rx="10" ry="10"/>
      <rect x="0" y="11" width="220" height="11"/>
    </symbol>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1480" height="980" fill="#FAF9F8"/>

  <!-- Title -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#201F1E">Interior Design Accelerator — Azure architecture</text>
  <text x="40" y="68" font-size="13" fill="#605E5C">Blazor Server · APIM · Azure Container Apps · Microsoft Foundry (gpt-4.1-mini + MAI-Image-2) · Azure AI Search · Blob Storage</text>

  <!-- ===== Cluster backgrounds ===== -->
  <!-- Edge -->
  <rect x="300" y="100" width="260" height="180" rx="14" fill="#EFF6FC" stroke="#C7E0F4" stroke-dasharray="4 3"/>
  <text x="316" y="124" font-size="13" font-weight="700" fill="#004578">???  EDGE / INGRESS</text>

  <!-- Compute -->
  <rect x="300" y="310" width="540" height="200" rx="14" fill="#F3EFF9" stroke="#D4C7EA" stroke-dasharray="4 3"/>
  <text x="316" y="334" font-size="13" font-weight="700" fill="#3B1F66">??  COMPUTE</text>

  <!-- Foundry -->
  <rect x="880" y="100" width="560" height="410" rx="14" fill="#F8EEF8" stroke="#E3C7E3" stroke-dasharray="4 3"/>
  <text x="896" y="124" font-size="13" font-weight="700" fill="#4B1A4B">??  MICROSOFT FOUNDRY PROJECT</text>

  <!-- Data -->
  <rect x="40" y="540" width="800" height="200" rx="14" fill="#EEF6EE" stroke="#C5E0C5" stroke-dasharray="4 3"/>
  <text x="56" y="564" font-size="13" font-weight="700" fill="#0B5A0B">??  DATA PLANE</text>

  <!-- Observability & Identity -->
  <rect x="880" y="540" width="560" height="200" rx="14" fill="#FCEEE6" stroke="#F4C7AE" stroke-dasharray="4 3"/>
  <text x="896" y="564" font-size="13" font-weight="700" fill="#A02800">??  OBSERVABILITY &amp; IDENTITY</text>

  <!-- ===== Tile macro (inline groups) ===== -->
  <!-- User -->
  <g transform="translate(60,180)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gUser)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gUser)"/>
    <!-- icon -->
    <circle cx="30" cy="56" r="10" fill="#605E5C"/>
    <path d="M14 78 q16 -16 32 0" stroke="#605E5C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="56" y="50" font-size="14" font-weight="700" fill="#201F1E">Designer</text>
    <text x="56" y="70" font-size="11" fill="#605E5C">Browser · HTTPS · SSE</text>
  </g>

  <!-- APIM -->
  <g transform="translate(320,160)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gEdge)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gEdge)"/>
    <path d="M20 60 l12 -8 l12 8 l0 16 q-12 8 -24 0 z" fill="#0078D4"/>
    <text x="56" y="50" font-size="14" font-weight="700" fill="#201F1E">API Management</text>
    <text x="56" y="68" font-size="11" fill="#605E5C">Consumption · subscription key</text>
  </g>

  <!-- Web.Ui -->
  <g transform="translate(320,370)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gCompute)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gCompute)"/>
    <rect x="16" y="46" width="32" height="22" rx="2" fill="#5C2D91"/>
    <rect x="18" y="48" width="28" height="6" fill="#fff"/>
    <text x="56" y="52" font-size="14" font-weight="700" fill="#201F1E">Web.Ui (Blazor)</text>
    <text x="56" y="70" font-size="11" fill="#605E5C">App Service B1 Linux</text>
  </g>

  <!-- Orchestrator -->
  <g transform="translate(600,370)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gCompute)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gCompute)"/>
    <circle cx="30" cy="58" r="11" fill="none" stroke="#5C2D91" stroke-width="3"/>
    <circle cx="30" cy="58" r="3" fill="#5C2D91"/>
    <text x="56" y="52" font-size="14" font-weight="700" fill="#201F1E">Orchestrator API</text>
    <text x="56" y="70" font-size="11" fill="#605E5C">.NET 8 Minimal API · ACA</text>
  </g>

  <!-- gpt-4.1-mini -->
  <g transform="translate(900,160)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gAI)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gAI)"/>
    <path d="M16 50 q0 -12 16 -12 h12 q16 0 16 12 v8 q0 12 -16 12 h-6 l-8 8 v-8 q-14 0 -14 -12 z" fill="#742774"/>
    <text x="68" y="50" font-size="14" font-weight="700" fill="#201F1E">gpt-4.1-mini</text>
    <text x="68" y="68" font-size="11" fill="#605E5C">plan · re-rank · compose</text>
  </g>

  <!-- MAI-Image-2 -->
  <g transform="translate(1180,160)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gAI)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gAI)"/>
    <rect x="14" y="42" width="36" height="28" rx="3" fill="#742774"/>
    <circle cx="24" cy="52" r="3" fill="#fff"/>
    <path d="M14 70 l12 -10 l8 6 l8 -14 l8 18 z" fill="#fff"/>
    <text x="58" y="50" font-size="14" font-weight="700" fill="#201F1E">MAI-Image-2</text>
    <text x="58" y="68" font-size="11" fill="#605E5C">1024×1024 text-to-image</text>
  </g>

  <!-- Hosted Agents -->
  <g transform="translate(900,310)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gAI)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gAI)"/>
    <circle cx="22" cy="56" r="7" fill="#742774"/>
    <circle cx="38" cy="56" r="7" fill="#742774"/>
    <circle cx="54" cy="56" r="7" fill="#742774"/>
    <text x="72" y="52" font-size="14" font-weight="700" fill="#201F1E">Hosted Agents</text>
    <text x="72" y="70" font-size="11" fill="#605E5C">chat · catalog-search · image-gen</text>
  </g>

  <!-- Azure AI Search (in Foundry cluster) -->
  <g transform="translate(1180,310)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gAI)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gAI)"/>
    <circle cx="28" cy="56" r="11" fill="none" stroke="#742774" stroke-width="3"/>
    <line x1="36" y1="64" x2="48" y2="76" stroke="#742774" stroke-width="3" stroke-linecap="round"/>
    <text x="58" y="52" font-size="14" font-weight="700" fill="#201F1E">Azure AI Search</text>
    <text x="58" y="70" font-size="11" fill="#605E5C">jaguar · parryware indexes</text>
  </g>

  <!-- Knowledge note (Foundry ? Search) -->
  <text x="990" y="410" font-size="11" font-style="italic" fill="#742774">Foundry Knowledge ? AI Search</text>

  <!-- Blob Storage -->
  <g transform="translate(60,610)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gData)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gData)"/>
    <ellipse cx="30" cy="46" rx="14" ry="5" fill="#107C10"/>
    <rect x="16" y="46" width="28" height="20" fill="#107C10"/>
    <ellipse cx="30" cy="66" rx="14" ry="5" fill="#0B5A0B"/>
    <text x="56" y="50" font-size="14" font-weight="700" fill="#201F1E">Blob Storage</text>
    <text x="56" y="70" font-size="11" fill="#605E5C">catalogs · products · generated</text>
  </g>

  <!-- Document Intelligence -->
  <g transform="translate(320,610)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gData)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gData)"/>
    <rect x="16" y="42" width="26" height="32" rx="2" fill="#fff" stroke="#107C10" stroke-width="2"/>
    <line x1="20" y1="50" x2="38" y2="50" stroke="#107C10" stroke-width="2"/>
    <line x1="20" y1="58" x2="38" y2="58" stroke="#107C10" stroke-width="2"/>
    <line x1="20" y1="66" x2="32" y2="66" stroke="#107C10" stroke-width="2"/>
    <text x="50" y="50" font-size="14" font-weight="700" fill="#201F1E">Document Intelligence</text>
    <text x="50" y="70" font-size="11" fill="#605E5C">Layout · deploy-time ingest</text>
  </g>

  <!-- Catalog PDFs (source) -->
  <g transform="translate(580,610)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gData)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gData)"/>
    <rect x="16" y="42" width="22" height="30" fill="#D83B01"/>
    <text x="20" y="63" font-size="10" font-weight="700" fill="#fff">PDF</text>
    <text x="46" y="50" font-size="14" font-weight="700" fill="#201F1E">Catalog PDFs</text>
    <text x="46" y="70" font-size="11" fill="#605E5C">Jaguar · Parryware (BYO)</text>
  </g>

  <!-- Log Analytics + App Insights -->
  <g transform="translate(900,610)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gObs)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gObs)"/>
    <polyline points="14,72 24,58 34,64 44,46 54,52" fill="none" stroke="#D83B01" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="50" font-size="14" font-weight="700" fill="#201F1E">Log Analytics</text>
    <text x="62" y="70" font-size="11" fill="#605E5C">+ Application Insights</text>
  </g>

  <!-- Managed Identity -->
  <g transform="translate(1180,610)">
    <use href="#tile"/>
    <rect x="0" y="0" width="220" height="22" rx="10" fill="url(#gId)"/>
    <rect x="0" y="11" width="220" height="11" fill="url(#gId)"/>
    <rect x="16" y="44" width="34" height="22" rx="3" fill="#0072C6"/>
    <circle cx="33" cy="54" r="5" fill="#fff"/>
    <rect x="26" y="58" width="14" height="6" fill="#fff"/>
    <text x="58" y="50" font-size="14" font-weight="700" fill="#201F1E">Managed Identity</text>
    <text x="58" y="70" font-size="11" fill="#605E5C">User-Assigned · AAD</text>
  </g>

  <!-- ===== Arrows (solid = runtime, dashed = build/identity) ===== -->
  <g stroke="#3A3A3A" stroke-width="1.8" fill="none" marker-end="url(#arrow)">
    <!-- User ? APIM -->
    <path d="M280 215 L320 215"/>
    <!-- APIM ? Web.Ui (down) -->
    <path d="M430 250 L430 370"/>
    <!-- Web.Ui ? Orchestrator -->
    <path d="M540 410 L600 410"/>
    <!-- Orchestrator ? gpt -->
    <path d="M820 390 C 900 390 900 215 900 215"/>
    <!-- Orchestrator ? MAI -->
    <path d="M820 400 C 1180 400 1180 215 1180 215"/>
    <!-- Orchestrator ? Search -->
    <path d="M820 430 C 1180 430 1180 365 1180 365"/>
    <!-- Orchestrator ? Blob -->
    <path d="M700 460 L180 610"/>
    <!-- Orchestrator ? Log Analytics -->
    <path d="M780 460 C 950 530 980 600 980 610"/>
    <!-- Web.Ui ? Log Analytics -->
    <path d="M460 460 C 750 540 950 600 970 610"/>
  </g>

  <!-- Dashed arrows -->
  <g stroke="#888" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowDashed)">
    <!-- DI ? Blob -->
    <path d="M330 660 L280 660"/>
    <!-- DI ? Search (build-time index) -->
    <path d="M540 640 C 900 540 1180 480 1230 365"/>
    <!-- PDFs ? DI -->
    <path d="M580 660 L540 660"/>
    <!-- MI ? Web.Ui -->
    <path d="M1180 645 C 700 720 500 540 440 460"/>
    <!-- MI ? Orchestrator -->
    <path d="M1180 640 C 950 600 800 530 720 460"/>
    <!-- MI ? APIM -->
    <path d="M1280 610 C 1180 400 700 280 540 230"/>
    <!-- Web.Ui ? Orchestrator (same-origin catalog proxy) -->
    <path d="M540 430 C 580 470 600 470 600 440"/>
  </g>

  <!-- Edge labels -->
  <g font-size="11" fill="#3A3A3A">
    <text x="282" y="208">HTTPS + SSE</text>
    <text x="436" y="320">HttpClient<tspan x="436" dy="14">+ APIM key</tspan></text>
    <text x="546" y="402">/api/design/*</text>
    <text x="836" y="296">Responses API</text>
    <text x="836" y="328">/mai/v1/images</text>
    <text x="836" y="358">semantic search</text>
    <text x="320" y="546" fill="#0B5A0B" font-style="italic">blob read/write (MI)</text>
    <text x="1010" y="556" fill="#A02800" font-style="italic">telemetry</text>
  </g>
  <g font-size="10" fill="#888" font-style="italic">
    <text x="540" y="676">ingest @ deploy</text>
    <text x="800" y="500">same-origin catalog proxy</text>
    <text x="1050" y="500">MI authN (dashed)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40,840)" font-size="12" fill="#201F1E">
    <rect x="0" y="0" width="1400" height="110" rx="10" fill="#FFFFFF" stroke="#D2D0CE"/>
    <text x="16" y="22" font-weight="700">Legend</text>

    <rect x="16" y="36" width="20" height="14" rx="3" fill="url(#gEdge)"/>      <text x="44" y="48">Edge / Ingress</text>
    <rect x="160" y="36" width="20" height="14" rx="3" fill="url(#gCompute)"/>  <text x="188" y="48">Compute</text>
    <rect x="280" y="36" width="20" height="14" rx="3" fill="url(#gAI)"/>       <text x="308" y="48">Microsoft Foundry / AI</text>
    <rect x="470" y="36" width="20" height="14" rx="3" fill="url(#gData)"/>     <text x="498" y="48">Data plane</text>
    <rect x="600" y="36" width="20" height="14" rx="3" fill="url(#gObs)"/>      <text x="628" y="48">Observability</text>
    <rect x="730" y="36" width="20" height="14" rx="3" fill="url(#gId)"/>       <text x="758" y="48">Identity (Managed Identity)</text>

    <line x1="16" y1="78" x2="56" y2="78" stroke="#3A3A3A" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="64" y="82">runtime request flow</text>
    <line x1="220" y1="78" x2="260" y2="78" stroke="#888" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowDashed)"/>
    <text x="268" y="82">deploy-time / managed-identity / proxy flow</text>
  </g>
</svg>
