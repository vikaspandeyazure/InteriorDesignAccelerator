<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 780" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Interior Design Accelerator Architecture">
  <title>Interior Design Accelerator Architecture</title>

  <defs>
    <!-- Soft drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1F"/>
    </marker>

    <!-- Gradients -->
    <linearGradient id="gFoundry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF3FB"/><stop offset="100%" stop-color="#CCE3F5"/>
    </linearGradient>
    <linearGradient id="gMAF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F4DA"/><stop offset="100%" stop-color="#CDE8B5"/>
    </linearGradient>
    <linearGradient id="gCatalog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF4D6"/><stop offset="100%" stop-color="#FBE2A1"/>
    </linearGradient>
    <linearGradient id="gAzureBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B88D8"/><stop offset="100%" stop-color="#0B5BAA"/>
    </linearGradient>

    <!-- Azure cloud icon -->
    <symbol id="azureCloud" viewBox="0 0 64 40" overflow="visible">
      <path d="M22 6 L40 6 L58 36 L18 36 L2 22 Z" fill="#0078D4"/>
      <path d="M22 6 L34 16 L26 24 L40 36 L58 36 L40 6 Z" fill="#50B0F0"/>
    </symbol>

    <!-- Monitor / desktop icon -->
    <symbol id="monitor" viewBox="0 0 80 70" overflow="visible">
      <rect x="2" y="2" width="76" height="50" rx="3" fill="#3A3A3A"/>
      <rect x="6" y="6" width="68" height="42" fill="#1E2A38"/>
      <rect x="32" y="54" width="16" height="6" fill="#3A3A3A"/>
      <rect x="22" y="60" width="36" height="4" rx="1" fill="#3A3A3A"/>
    </symbol>

    <!-- Database (cylinder) icon -->
    <symbol id="db" viewBox="0 0 60 60" overflow="visible">
      <ellipse cx="30" cy="10" rx="22" ry="7" fill="#3576B5"/>
      <path d="M8 10 L8 50 Q8 57 30 57 Q52 57 52 50 L52 10" fill="#3576B5"/>
      <ellipse cx="30" cy="10" rx="22" ry="7" fill="none" stroke="#1F4F82" stroke-width="1"/>
      <path d="M8 25 Q8 32 30 32 Q52 32 52 25" fill="none" stroke="#1F4F82" stroke-width="1"/>
      <path d="M8 40 Q8 47 30 47 Q52 47 52 40" fill="none" stroke="#1F4F82" stroke-width="1"/>
    </symbol>

    <!-- Folder icon -->
    <symbol id="folder" viewBox="0 0 60 50" overflow="visible">
      <path d="M2 10 L22 10 L28 16 L58 16 L58 44 L2 44 Z" fill="#E8A33D" stroke="#9C6A18" stroke-width="1"/>
      <path d="M2 18 L58 18 L58 44 L2 44 Z" fill="#F2BE5C"/>
    </symbol>

    <!-- API Management cloud icon (purple/blue swirl approximation) -->
    <symbol id="apim" viewBox="0 0 70 60" overflow="visible">
      <path d="M20 18 Q12 18 10 28 Q2 30 4 40 Q6 50 18 50 L52 50 Q66 50 66 38 Q66 28 56 26 Q54 14 42 14 Q30 14 26 22 Q22 18 20 18 Z" fill="#5B9BD5"/>
      <path d="M22 28 Q30 24 38 30 Q46 36 54 32" fill="none" stroke="#A569BD" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <!-- Azure Container Apps icon -->
    <symbol id="aca" viewBox="0 0 40 40" overflow="visible">
      <rect x="4" y="4" width="32" height="32" rx="4" fill="#A864E8"/>
      <rect x="10" y="10" width="9" height="9" fill="#fff"/>
      <rect x="21" y="10" width="9" height="9" fill="#fff"/>
      <rect x="10" y="21" width="9" height="9" fill="#fff"/>
      <rect x="21" y="21" width="9" height="9" fill="#fff"/>
    </symbol>

    <!-- Azure App Service icon (globe-like) -->
    <symbol id="appsvc" viewBox="0 0 40 40" overflow="visible">
      <circle cx="20" cy="20" r="16" fill="#0078D4"/>
      <ellipse cx="20" cy="20" rx="16" ry="6" fill="none" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="20" cy="20" rx="6" ry="16" fill="none" stroke="#fff" stroke-width="1.5"/>
      <line x1="4" y1="20" x2="36" y2="20" stroke="#fff" stroke-width="1.5"/>
    </symbol>

    <!-- Azure Monitor icon -->
    <symbol id="monitorIcon" viewBox="0 0 40 40" overflow="visible">
      <circle cx="20" cy="20" r="16" fill="#fff" stroke="#0078D4" stroke-width="3"/>
      <path d="M20 4 A16 16 0 0 1 36 20 L20 20 Z" fill="#0078D4"/>
      <circle cx="20" cy="20" r="4" fill="#0078D4"/>
    </symbol>

    <!-- Azure AI Search icon -->
    <symbol id="search" viewBox="0 0 50 50" overflow="visible">
      <circle cx="20" cy="20" r="13" fill="none" stroke="#0078D4" stroke-width="4"/>
      <line x1="30" y1="30" x2="44" y2="44" stroke="#0078D4" stroke-width="5" stroke-linecap="round"/>
    </symbol>

    <!-- Foundry IQ flower-like logo -->
    <symbol id="foundryIQ" viewBox="0 0 40 40" overflow="visible">
      <g transform="translate(20 20)">
        <circle r="5" fill="#A45BD8"/>
        <g fill="#A45BD8">
          <ellipse cx="0" cy="-11" rx="4" ry="6"/>
          <ellipse cx="0" cy="11" rx="4" ry="6"/>
          <ellipse cx="-11" cy="0" rx="6" ry="4"/>
          <ellipse cx="11" cy="0" rx="6" ry="4"/>
          <ellipse cx="-8" cy="-8" rx="5" ry="4" transform="rotate(-45)"/>
          <ellipse cx="8" cy="-8" rx="5" ry="4" transform="rotate(45)"/>
          <ellipse cx="-8" cy="8" rx="5" ry="4" transform="rotate(45)"/>
          <ellipse cx="8" cy="8" rx="5" ry="4" transform="rotate(-45)"/>
        </g>
      </g>
    </symbol>

    <!-- Document Intelligence icon -->
    <symbol id="docIntel" viewBox="0 0 40 40" overflow="visible">
      <rect x="8" y="4" width="24" height="32" rx="2" fill="#fff" stroke="#0B5BAA" stroke-width="1.5"/>
      <line x1="12" y1="12" x2="28" y2="12" stroke="#0B5BAA" stroke-width="1.5"/>
      <line x1="12" y1="18" x2="28" y2="18" stroke="#0B5BAA" stroke-width="1.5"/>
      <line x1="12" y1="24" x2="22" y2="24" stroke="#0B5BAA" stroke-width="1.5"/>
    </symbol>

    <!-- AI Rendered Image (picture frame) -->
    <symbol id="picture" viewBox="0 0 110 80" overflow="visible">
      <rect x="2" y="2" width="106" height="76" rx="4" fill="#fff" stroke="#888" stroke-width="2"/>
      <rect x="6" y="6" width="98" height="68" fill="#FCE9B0"/>
      <circle cx="32" cy="28" r="8" fill="#F4B400"/>
      <polygon points="6,74 40,46 60,62 80,40 104,74" fill="#A06A30"/>
    </symbol>
  </defs>

  <!-- ===== Outer frame ===== -->
  <rect x="6" y="6" width="1148" height="768" rx="10" fill="#FFFFFF" stroke="#1F4E8A" stroke-width="2"/>

  <!-- ===== Title ===== -->
  <text x="580" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1F4E8A">Interior Design Accelerator Architecture</text>

  <!-- ===== Microsoft Foundry (top center) ===== -->
  <g>
    <rect x="370" y="60" width="430" height="160" rx="10" fill="url(#gFoundry)" stroke="#5B9BD5" stroke-width="1.5" filter="url(#shadow)"/>
    <use href="#azureCloud" x="478" y="68" width="36" height="22"/>
    <text x="585" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E8A">Microsoft Foundry</text>

    <!-- Azure OpenAI tile -->
    <rect x="386" y="100" width="158" height="42" rx="6" fill="url(#gAzureBtn)" stroke="#0B5BAA"/>
    <polygon points="402,114 410,108 418,114 414,124 406,124" fill="#fff"/>
    <text x="430" y="127" font-size="13" font-weight="600" fill="#fff">Azure OpenAI</text>

    <!-- Foundry IQ tile -->
    <rect x="552" y="100" width="120" height="42" rx="6" fill="#fff" stroke="#0B5BAA" stroke-width="1.5"/>
    <use href="#foundryIQ" x="560" y="108" width="26" height="26"/>
    <text x="592" y="127" font-size="13" font-weight="600" fill="#1F1F1F">Foundry IQ</text>

    <!-- Document Intelligence tile -->
    <rect x="680" y="100" width="110" height="60" rx="6" fill="url(#gAzureBtn)" stroke="#0B5BAA"/>
    <use href="#docIntel" x="686" y="108" width="28" height="42"/>
    <text x="720" y="125" font-size="11" font-weight="600" fill="#fff">Document</text>
    <text x="720" y="140" font-size="11" font-weight="600" fill="#fff">Intelligence</text>

    <!-- GPT-4.1 Mini tile -->
    <rect x="386" y="152" width="158" height="42" rx="6" fill="#fff" stroke="#0B5BAA" stroke-width="1.5"/>
    <use href="#foundryIQ" x="394" y="160" width="24" height="24"/>
    <text x="424" y="178" font-size="13" font-weight="600" fill="#1F1F1F">GPT-4.1 Mini</text>
  </g>

  <!-- ===== MAI-Image Generation (top right) ===== -->
  <g>
    <rect x="830" y="60" width="290" height="200" rx="10" fill="#EAF3FB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="975" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#1F4E8A">MAI-Image Generation</text>
    <use href="#azureCloud" x="855" y="110" width="60" height="40"/>
    <use href="#picture" x="930" y="100" width="170" height="120"/>
    <text x="975" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">AI Rendered Images</text>
  </g>

  <!-- ===== Client: Design Studio UI (left) ===== -->
  <g>
    <rect x="40" y="170" width="270" height="280" rx="10" fill="#EAF3FB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="175" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1F4E8A">Client: Design Studio UI</text>
    <text x="175" y="220" text-anchor="middle" font-size="12" fill="#1F1F1F">(Blazor Server)</text>

    <use href="#monitor" x="115" y="230" width="120" height="105"/>
    <rect x="135" y="248" width="80" height="60" fill="#C9B79A"/>
    <text x="175" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1F">Luxury Marble Ensuite</text>

    <text x="175" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#1F1F1F">User Input: Design Request</text>
  </g>

  <!-- ===== API Gateway / APIM (between client and MAF) ===== -->
  <g>
    <text x="345" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#1F1F1F">API Gateway</text>
    <rect x="318" y="306" width="56" height="14" fill="#0078D4"/>
    <polygon points="374,306 384,313 374,320" fill="#0078D4"/>
    <use href="#apim" x="305" y="328" width="80" height="60"/>
    <text x="345" y="402" text-anchor="middle" font-size="11" fill="#1F1F1F">Azure</text>
    <text x="345" y="415" text-anchor="middle" font-size="11" fill="#1F1F1F">API Management</text>
  </g>

  <!-- ===== MAF (Orchestration Layer) ===== -->
  <g>
    <rect x="400" y="260" width="400" height="180" rx="10" fill="url(#gMAF)" stroke="#6FAE3F" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="600" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#2C5E12">MAF (Orchestration Layer)</text>

    <rect x="420" y="300" width="360" height="36" rx="4" fill="#fff" stroke="#7CB342"/>
    <text x="600" y="324" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">Request Handler</text>

    <rect x="420" y="344" width="360" height="36" rx="4" fill="#fff" stroke="#7CB342"/>
    <text x="600" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">Workflow Orchestrator</text>

    <rect x="420" y="388" width="360" height="36" rx="4" fill="#fff" stroke="#7CB342"/>
    <text x="600" y="412" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">Trace Monitor (SSE)</text>
  </g>

  <!-- ===== Deployment & Hosting (right) ===== -->
  <g>
    <rect x="850" y="290" width="270" height="160" rx="10" fill="#EAF3FB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#shadow)"/>
    <use href="#aca" x="862" y="298" width="22" height="22"/>
    <text x="985" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#1F4E8A">Deployment &amp; Hosting</text>

    <rect x="870" y="335" width="230" height="48" rx="6" fill="url(#gAzureBtn)" stroke="#0B5BAA"/>
    <use href="#aca" x="880" y="345" width="28" height="28"/>
    <text x="1000" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Azure Container Apps</text>

    <rect x="870" y="392" width="230" height="48" rx="6" fill="#fff" stroke="#0B5BAA" stroke-width="1.5"/>
    <use href="#appsvc" x="880" y="400" width="32" height="32"/>
    <text x="1000" y="422" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">Azure App Service</text>
  </g>

  <!-- ===== Brand Catalogs & Metadata Storage ===== -->
  <g>
    <rect x="320" y="480" width="560" height="140" rx="10" fill="url(#gCatalog)" stroke="#D4A93A" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="600" y="506" text-anchor="middle" font-size="15" font-weight="700" fill="#7A5A10">Brand Catalogs &amp; Metadata Storage</text>

    <!-- Jaguar Catalog -->
    <g transform="translate(346 522)">
      <rect x="0" y="0" width="200" height="46" rx="4" fill="#fff" stroke="#C9A23A"/>
      <text x="14" y="22" font-size="14" font-weight="800" fill="#000" font-style="italic">JAGUAR</text>
      <line x1="14" y1="28" x2="78" y2="28" stroke="#000" stroke-width="1"/>
      <text x="92" y="30" font-size="13" font-weight="600" fill="#1F1F1F">Jaguar Catalog</text>
    </g>

    <!-- Parryware Catalog -->
    <g transform="translate(560 522)">
      <rect x="0" y="0" width="280" height="46" rx="4" fill="#fff" stroke="#C9A23A"/>
      <use href="#azureCloud" x="6" y="10" width="36" height="24"/>
      <text x="50" y="30" font-size="15" font-weight="700" fill="#1F4E8A" font-style="italic">Parryware</text>
      <text x="146" y="30" font-size="13" font-weight="600" fill="#1F1F1F">Catalog</text>
      <rect x="246" y="10" width="24" height="24" fill="#F4B400"/>
      <text x="258" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">A</text>
    </g>

    <!-- Azure Blob Storage -->
    <g transform="translate(490 580)">
      <rect x="0" y="0" width="220" height="30" rx="4" fill="#E0F0DA" stroke="#7CB342"/>
      <use href="#db" x="6" y="2" width="26" height="26"/>
      <text x="120" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1F1F1F">Azure Blob Storage</text>
    </g>
  </g>

  <!-- ===== Catalog PDFs (left of catalogs) ===== -->
  <g>
    <use href="#db" x="220" y="525" width="40" height="40"/>
    <use href="#folder" x="252" y="540" width="60" height="46"/>
    <text x="245" y="600" text-anchor="middle" font-size="12" font-weight="600" fill="#1F1F1F">Catalog PDFs</text>
  </g>

  <!-- ===== Azure AI Search ===== -->
  <g>
    <text x="600" y="680" text-anchor="middle" font-size="16" font-weight="700" fill="#1F1F1F">Azure AI Search</text>
    <use href="#search" x="690" y="660" width="40" height="40"/>
  </g>

  <!-- ===== Logging & Monitoring (bottom right) ===== -->
  <g>
    <rect x="880" y="660" width="230" height="70" rx="8" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.5" filter="url(#shadow)"/>
    <use href="#monitorIcon" x="896" y="676" width="40" height="40"/>
    <text x="1020" y="688" text-anchor="middle" font-size="14" font-weight="700" fill="#1F1F1F">Logging &amp; Monitoring</text>
    <text x="1020" y="708" text-anchor="middle" font-size="12" fill="#5A5A5A">Azure Monitor</text>
  </g>

  <!-- ===== Connectors / Arrows ===== -->
  <!-- Client -> APIM (API Gateway) -->
  <line x1="310" y1="313" x2="318" y2="313" stroke="#1F1F1F" stroke-width="2"/>
  <!-- APIM -> MAF -->
  <line x1="385" y1="358" x2="400" y2="358" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Foundry -> MAF (down) -->
  <line x1="600" y1="220" x2="600" y2="260" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Foundry (Document Intelligence) -> MAI Image Generation (right) -->
  <line x1="790" y1="130" x2="830" y2="155" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- MAF -> Deployment (3 arrows) -->
  <line x1="800" y1="318" x2="850" y2="358" stroke="#1F1F1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="362" x2="850" y2="362" stroke="#1F1F1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="406" x2="850" y2="416" stroke="#1F1F1F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MAF -> Brand Catalogs (down) -->
  <line x1="600" y1="440" x2="600" y2="480" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Catalog PDFs -> Brand Catalogs -->
  <line x1="312" y1="555" x2="345" y2="555" stroke="#1F1F1F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Brand Catalogs -> Azure AI Search (down) -->
  <line x1="600" y1="620" x2="600" y2="660" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Foundry IQ -> Azure AI Search (long curved path on right) -->
  <path d="M612 142 C 612 200, 900 220, 900 500 C 900 640, 760 680, 730 680" fill="none" stroke="#1F1F1F" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
